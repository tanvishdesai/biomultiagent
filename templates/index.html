<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>BioMultiAgent · Bioinformatics AI Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header { text-align: center; margin-bottom: 2rem; }
    header h1 { font-size: 2.2rem; font-weight: 700; color: #58a6ff; }
    header p  { color: #8b949e; margin-top: 0.4rem; }
    .badge {
      display: inline-block; background: #1c2b3a;
      border: 1px solid #1f6feb; color: #79c0ff;
      font-size: 0.72rem; padding: 2px 8px; border-radius: 9999px; margin: 0 3px;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 1.5rem;
      width: 100%; max-width: 860px;
      margin-bottom: 1.5rem;
    }
    .examples { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
    .ex-btn {
      background: #1c2b3a; border: 1px solid #1f6feb;
      color: #58a6ff; border-radius: 6px;
      padding: 4px 10px; font-size: 0.8rem; cursor: pointer;
    }
    .ex-btn:hover { background: #1f6feb; color: #fff; }
    textarea {
      width: 100%; background: #0d1117; border: 1px solid #30363d;
      color: #c9d1d9; border-radius: 8px; padding: 0.75rem 1rem;
      font-size: 1rem; resize: vertical; min-height: 80px;
    }
    textarea:focus { outline: none; border-color: #58a6ff; }
    .row { display: flex; gap: 0.75rem; margin-top: 0.75rem; align-items: center; }
    button.submit {
      background: #1f6feb; color: #fff; border: none;
      border-radius: 8px; padding: 0.6rem 1.4rem;
      font-size: 1rem; cursor: pointer; font-weight: 600;
    }
    button.submit:hover { background: #388bfd; }
    button.submit:disabled { background: #30363d; cursor: not-allowed; }
    .spinner {
      display: none; width: 20px; height: 20px;
      border: 3px solid #30363d; border-top-color: #58a6ff;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .intent-badge {
      display: inline-block; background: #1c2b3a;
      border: 1px solid #30363d; color: #e3b341;
      font-size: 0.78rem; padding: 2px 10px; border-radius: 4px;
    }
    #result-area { display: none; }
    #result-area h3 { color: #58a6ff; margin-bottom: 0.75rem; }
    .agent-block {
      background: #0d1117; border-left: 3px solid #238636;
      padding: 1rem; border-radius: 0 8px 8px 0;
      white-space: pre-wrap; font-size: 0.88rem; line-height: 1.6;
      margin-bottom: 0.75rem;
    }
    .citations-block { margin-top: 1rem; }
    .citation-item {
      font-size: 0.8rem; color: #8b949e;
      padding: 3px 0; border-bottom: 1px solid #21262d;
    }
    .error-msg { color: #f85149; font-size: 0.88rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <header>
    <h1>BioMultiAgent</h1>
    <p>Multi-agent bioinformatics AI ·
      <span class="badge">SeqAgent</span>
      <span class="badge">AlignAgent</span>
      <span class="badge">AnnotAgent</span>
      <span class="badge">PhyloAgent</span>
      <span class="badge">LitAgent</span>
    </p>
  </header>

  <div class="card">
    <p style="font-size:.85rem;color:#8b949e;margin-bottom:.75rem">Try a compound query — multiple agents fire in parallel:</p>
    <div class="examples">
      <button class="ex-btn" onclick="setQ(this)">Translate ATGGCCATTGTAATGGGCCGCTGAAAGGGTGCCCGATAG and predict ORFs</button>
      <button class="ex-btn" onclick="setQ(this)">Align ATGGCCATTGTAATG and ATGGCCATTGCAATG and find papers on BRCA1</button>
      <button class="ex-btn" onclick="setQ(this)">Find 5 recent PubMed papers on RNA structure prediction</button>
      <button class="ex-btn" onclick="setQ(this)">Build a phylogenetic tree for ATGGCCATT ATGGCCATG ATGGCCATC</button>
    </div>
    <textarea id="query" placeholder="Ask a compound bioinformatics question…"></textarea>
    <div class="row">
      <button class="submit" onclick="ask()" id="ask-btn">Analyze</button>
      <div class="spinner" id="spinner"></div>
      <span id="error" class="error-msg"></span>
    </div>
  </div>

  <div class="card" id="result-area">
    <div id="intent-row" style="margin-bottom:.75rem"></div>
    <h3>Results</h3>
    <div id="result-content"></div>
    <div class="citations-block" id="citations-block" style="display:none">
      <p style="color:#58a6ff;font-size:.85rem;font-weight:600;margin-bottom:.4rem">Citations</p>
      <div id="citations-list"></div>
    </div>
  </div>

  <script>
    function setQ(btn) { document.getElementById("query").value = btn.textContent; }

    async function ask() {
      const q   = document.getElementById("query").value.trim();
      if (!q) return;
      const btn = document.getElementById("ask-btn");
      const sp  = document.getElementById("spinner");
      const err = document.getElementById("error");
      btn.disabled = true; sp.style.display = "block"; err.textContent = "";
      document.getElementById("result-area").style.display = "none";

      try {
        const res  = await fetch("/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query: q }),
        });
        const data = await res.json();
        if (!res.ok) { err.textContent = data.error || "Server error"; return; }

        const ir = document.getElementById("intent-row");
        ir.innerHTML = `<span class="intent-badge">intent: ${data.intent}</span> `
          + (data.sub_tasks || []).map(s => `<span class="intent-badge" style="color:#7ee787">${s}</span>`).join(" ");

        const rc = document.getElementById("result-content");
        rc.innerHTML = "";
        // Split by agent sections (** headers)
        const sections = data.result.split(/\n\n(?=\*\*)/);
        for (const sec of sections) {
          const block = document.createElement("div");
          block.className = "agent-block";
          block.textContent = sec;
          rc.appendChild(block);
        }

        const cb = document.getElementById("citations-block");
        const cl = document.getElementById("citations-list");
        if (data.citations && data.citations.length > 0) {
          cl.innerHTML = data.citations.map(c =>
            `<div class="citation-item">${c}</div>`
          ).join("");
          cb.style.display = "block";
        } else {
          cb.style.display = "none";
        }

        document.getElementById("result-area").style.display = "block";
      } catch(e) {
        err.textContent = "Request failed: " + e.message;
      } finally {
        btn.disabled = false; sp.style.display = "none";
      }
    }

    document.getElementById("query").addEventListener("keydown", e => {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) ask();
    });
  </script>
</body>
</html>
